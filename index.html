</a><script>
  document.addEventListener('DOMContentLoaded', () => {
    const popup = document.getElementById('welcome-popup');
    const closeBtn = document.getElementById('close-Btn');
    const dontShowCheckbox = document.getElementById('dont-show-again');
    const popupTitle = document.getElementById('popup-title');
    const popupImg = document.getElementById('popup-img');
    const popupText = document.getElementById('popup-text');
    const checkboxWrap = document.getElementById('checkbox-wrap');

    // Central function to handle all popup content
    const showPopup = (title, imgSrc, message, isWelcome = false) => {
      popupTitle.textContent = title;
      popupImg.src = imgSrc;
      popupText.textContent = message;
      
      // Hide the "Don't show again" option for object clicks
      checkboxWrap.style.display = isWelcome ? 'block' : 'none';
      popup.classList.remove('popup-hidden');
    };

    // Check for "Don't show again" preference on load
    if (localStorage.getItem('hideWelcomePopup') === 'true') {
      popup.classList.add('popup-hidden');
    } else {
      // Show initial welcome with couple image
      showPopup('Welcome to Magical Winter!', 'img/couple.jpg', 'Enjoy the magical winter scenery. Click on the trees or the bench to interact!', true);
    }

    if (closeBtn) {
      closeBtn.addEventListener('click', () => {
        if (dontShowCheckbox && dontShowCheckbox.checked) {
          localStorage.setItem('hideWelcomePopup', 'true');
        }
        popup.classList.add('popup-hidden');
      });
    }

    const leftTree = document.querySelector('.tree:not(.right)');
    const rightTree = document.querySelector('.tree.right');
    const bench = document.querySelector('.bench');

    // Click Interactions
    if (leftTree) {
      leftTree.addEventListener('click', () => {
        showPopup('The Left Tree', 'img/male.jpg', 'You clicked the Left Tree!');
      });
    }

    if (rightTree) {
      rightTree.addEventListener('click', () => {
        showPopup('The Right Tree', 'img/female.jpg', 'You clicked the Right Tree!');
      });
    }

    if (bench) {
      bench.addEventListener('click', () => {
        showPopup('The Park Bench', 'img/couple.jpg', 'A cozy spot for two!');
      });
    }
  });
</script>
